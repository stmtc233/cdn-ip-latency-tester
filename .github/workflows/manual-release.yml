name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (example: v1.0.0)
        required: true
        type: string
      release_name:
        description: Release name
        required: true
        type: string
      release_notes:
        description: Release notes
        required: false
        default: Manual release build
        type: string
      prerelease:
        description: Mark as prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            binary_name: cdn-ip-latency-tester-windows-amd64.exe
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            binary_name: cdn-ip-latency-tester-linux-amd64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            binary_name: cdn-ip-latency-tester-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.binary_name }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p publish
          find release-assets -type f -exec cp {} publish/ \;
          ls -la publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: publish/*
